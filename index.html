<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>33antoinz - Auto Uploader</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-10 font-sans">
    <div class="max-w-xl mx-auto bg-gray-800 p-8 rounded-xl shadow-lg">
        <h1 class="text-3xl font-bold mb-6 text-center text-purple-400">Type Beat Uploader</h1>
        
        <form id="uploadForm" action="/upload" method="POST" enctype="multipart/form-data" class="space-y-5">
            <div>
                <label class="block text-sm font-medium mb-1">Titre de la prod</label>
                <input type="text" name="title" required placeholder="ex: [FREE] Playboi Carti Type Beat - 'VAMP'" class="w-full p-2 bg-gray-700 rounded border border-gray-600 focus:border-purple-400 focus:outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">Tags (séparés par des virgules)</label>
                <input type="text" name="tags" required placeholder="type beat, trap, dark, playboi carti" class="w-full p-2 bg-gray-700 rounded border border-gray-600 focus:border-purple-400 focus:outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">Fichier Audio (.wav, .flac)</label>
                <input type="file" name="audio" accept=".wav,.flac" required class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-purple-600 file:text-white hover:file:bg-purple-700">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">Cover (.jpg, .png)</label>
                <input type="file" name="cover" accept=".jpg,.png" required class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-gray-600 file:text-white hover:file:bg-gray-700">
            </div>

            <div class="flex space-x-4 pt-2">
                <label class="flex items-center space-x-2">
                    <input type="checkbox" name="youtube" checked class="w-4 h-4 text-purple-600 bg-gray-700 border-gray-600 rounded">
                    <span>YouTube</span>
                </label>
                <label class="flex items-center space-x-2">
                    <input type="checkbox" name="bandcamp" checked class="w-4 h-4 text-purple-600 bg-gray-700 border-gray-600 rounded">
                    <span>Bandcamp</span>
                </label>
            </div>

            <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 font-bold py-3 px-4 rounded transition duration-200 mt-4">
                Générer & Uploader
            </button>
        </form>
    </div>
</body>
</html>
